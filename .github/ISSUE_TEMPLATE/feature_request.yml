name: Feature request
description: Propose a CppBridgeJ capability or API change.
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe the native workload and why the current API is not enough.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Suggested Java annotation/API, Maven plugin behavior, or runtime behavior.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Any impact on native signatures, platforms, or existing users.
