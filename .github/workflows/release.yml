name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Verify
        run: mvn -B -Pcoverage clean verify

      - name: Package source archive
        run: ./scripts/package-source.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            target/*.zip
            cppbridge-core/target/*.jar
            cppbridge-maven-plugin/target/*.jar
            cppbridge-example/target/*.jar
            cppbridge-benchmark/target/benchmarks.jar
