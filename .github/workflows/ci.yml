name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Install Linux compiler
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Verify
        run: mvn -B -Pcoverage clean verify

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: |
            **/target/site/jacoco
            **/target/surefire-reports
          if-no-files-found: ignore

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Verify Java modules
        run: mvn -B -pl cppbridge-core,cppbridge-maven-plugin clean verify
